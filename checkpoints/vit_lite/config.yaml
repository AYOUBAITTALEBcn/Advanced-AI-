model:
  name: vit
  budget: lite
  patch_embed: 4
  dim: 120
  depth: 6
  heads: 6
  window: 8
  pe_type: rope2d
data:
  train_dir: ./datasets/DIV2K_train_HR
  val_dir: ./datasets/DIV2K_valid_HR
  test:
  - kodak
  - mcm
  patch: 64
  bayer: RGGB
  num_workers: 4
  val_max_images: 20
train:
  total_iters: 150000
  batch: 16
  lr: 0.0002
  scheduler: cosine
  loss: l1
  amp: true
  grad_clip: 1.0
  val_every: 5000
  seed: 42
  deterministic: false
eval:
  shave: 8
  tile: 64
  tile_overlap: 16
  flops_size: 256
