model:
  name: swinir
  budget: lite          # lite | base
  embed_dim: 60
  depths: [6, 6, 6, 6]
  heads: [6, 6, 6, 6]
  window: 8             # pixel tokens (no downsampling in SwinIR)
  mlp_ratio: 4.0        # tuned so lite lands ~1.25M, matching cnn/vit
data:
  train_dir: ./datasets/DIV2K_train_HR
  val_dir: ./datasets/DIV2K_valid_HR
  test: [kodak, mcm]
  patch: 64
  bayer: RGGB
  num_workers: 4
  val_max_images: 20
train:
  total_iters: 150000
  # 24 transformer blocks (depths sum) makes SwinIR the deepest of the three
  # models; batch 16 OOMs on a 6GB GPU even with --grad_checkpoint (verified
  # on the reference laptop -- see README). Use --grad_checkpoint and keep
  # batch at 8 for lite/base; cnn/vit stay at 16 since they don't need it.
  batch: 8
  lr: 2.0e-4
  scheduler: cosine
  loss: l1
  amp: true
  grad_clip: 1.0
  val_every: 5000
  seed: 42
  deterministic: false
eval:
  shave: 8
  tile: 64
  tile_overlap: 16
  flops_size: 256
