model:
  name: vit            # cnn | swinir | vit
  budget: lite         # lite | base
  patch_embed: 4
  dim: 120
  depth: 6
  heads: 6
  window: 8            # tokens; = grid_size (patch/patch_embed) means global
  pe_type: rope2d      # none | learnable | sinusoidal2d | rope2d
data:
  train_dir: ./datasets/DIV2K_train_HR
  val_dir: ./datasets/DIV2K_valid_HR
  test: [kodak, mcm]
  patch: 64
  bayer: RGGB
  num_workers: 4
  val_max_images: 20   # fixed subset of val for speed (first N, sorted)
train:
  total_iters: 150000
  batch: 16
  lr: 2.0e-4
  scheduler: cosine
  loss: l1
  amp: true
  grad_clip: 1.0
  val_every: 5000
  seed: 42
  deterministic: false
eval:
  shave: 8
  tile: 64
  tile_overlap: 16
  flops_size: 256
